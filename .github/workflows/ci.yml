name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # required to commit the coverage badge on main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.app.json

      # Fast-fail on the homework normalization suite (legacy `actions` migration)
      - name: Unit tests — PatientHomework (actions migration)
        run: bunx vitest run src/components/app/PatientHomework.test.ts --reporter=verbose

      # Full suite with coverage — enforces thresholds defined in vitest.config.ts
      - name: Unit tests with coverage
        run: bun run test:coverage

      - name: Publish coverage summary
        if: always()
        run: |
          SUMMARY_FILE="coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "No coverage summary found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node -e '
            const fs = require("fs");
            const s = JSON.parse(fs.readFileSync("coverage/coverage-summary.json", "utf8"));
            const t = s.total;
            const pct = (m) => `${t[m].pct.toFixed(2)}%`;

            const homeworkKey = Object.keys(s).find(k =>
              k.endsWith("src/components/app/PatientHomework.tsx")
            );
            const h = homeworkKey ? s[homeworkKey] : null;

            const lines = [];
            lines.push("## Coverage report");
            lines.push("");
            lines.push("| Metric | Total | PatientHomework.tsx |");
            lines.push("|---|---|---|");
            for (const m of ["lines", "statements", "functions", "branches"]) {
              const hPct = h ? `${h[m].pct.toFixed(2)}%` : "n/a";
              lines.push(`| ${m} | ${pct(m)} | ${hPct} |`);
            }
            lines.push("");
            lines.push("Threshold enforced on `src/components/app/PatientHomework.tsx` to keep the legacy `actions` migration path protected.");

            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");

            console.log(`Total lines: ${pct("lines")} · statements: ${pct("statements")} · functions: ${pct("functions")} · branches: ${pct("branches")}`);
            if (h) {
              console.log(`PatientHomework.tsx lines: ${h.lines.pct.toFixed(2)}% · branches: ${h.branches.pct.toFixed(2)}%`);
            }
          '

      - name: Generate coverage badge (shields.io endpoint)
        if: always()
        run: |
          mkdir -p .github/badges
          node -e '
            const fs = require("fs");
            if (!fs.existsSync("coverage/coverage-summary.json")) process.exit(0);
            const t = JSON.parse(fs.readFileSync("coverage/coverage-summary.json", "utf8")).total;
            const pct = t.lines.pct;
            const color =
              pct >= 90 ? "brightgreen" :
              pct >= 75 ? "green" :
              pct >= 60 ? "yellowgreen" :
              pct >= 40 ? "yellow" :
              pct >= 20 ? "orange" : "red";
            const badge = {
              schemaVersion: 1,
              label: "coverage",
              message: `${pct.toFixed(1)}%`,
              color,
            };
            fs.writeFileSync(".github/badges/coverage.json", JSON.stringify(badge, null, 2) + "\n");
            console.log("Badge:", badge);
          '

      - name: Commit coverage badge (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "Badge unchanged, skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          git commit -m "chore(ci): update coverage badge [skip ci]"
          git push

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
