name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck & tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.app.json

      # Fast-fail on the homework normalization suite (legacy `actions` migration)
      - name: Unit tests — PatientHomework (actions migration)
        run: bunx vitest run src/components/app/PatientHomework.test.ts --reporter=verbose

      # Full suite: every *.test.ts / *.spec.ts under src/
      - name: Unit tests — full suite
        run: bun run test
